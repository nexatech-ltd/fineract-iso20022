spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:iso20022_adapter}?useSSL=${DB_USE_SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=UTC
  data:
    redis:
      host: ${REDIS_HOST:dragonfly}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

fineract:
  api:
    base-url: ${FINERACT_API_URL:https://fineract:8443/fineract-provider/api/v1}
    ssl-trust-all: true

logging:
  level:
    org.fineract.iso20022: INFO
